name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is named master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14' # Angular 11 is compatible with Node 14

      - name: Install dependencies
        run: npm install

      - name: Build project
        # Replace 'YOUR-REPO-NAME' with your actual repository name  
	      run: npm run build -- --prod --base-href /ProjectAlpha/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/ProjectAlpha # Check your angular.json for this path
          branch: gh-pages
