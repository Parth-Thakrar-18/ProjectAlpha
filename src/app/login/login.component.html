<div class="login-container">
  <!-- Animated Background Elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-card glass-panel">
    <div class="brand-header">
      <div class="brand-icon pulse-custom">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
    </div>

    <div class="auth-headings">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your ProDash account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div *ngIf="errorMessage" class="error-message general-error animate-fade-in">
        <svg viewBox="0 0 24 24" fill="none" class="error-icon" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <div *ngIf="successMessage" class="success-message general-success animate-fade-in">
        <svg viewBox="0 0 24 24" fill="none" class="success-icon" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <div class="form-group slide-up-1">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input id="email" type="email" formControlName="email" class="form-input"
            [ngClass]="{ 'input-error': submitted && f['email'].errors }" placeholder="name@company.com"
            [disabled]="isLoading" />
        </div>
        <div *ngIf="submitted && f['email'].errors" class="error-message animate-fade-in">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Email is invalid</span>
        </div>
      </div>

      <div class="form-group slide-up-2">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input id="password" type="password" formControlName="password" class="form-input"
            [ngClass]="{ 'input-error': submitted && f['password'].errors }" placeholder="••••••••"
            [disabled]="isLoading" />
        </div>
        <div *ngIf="submitted && f['password'].errors" class="error-message animate-fade-in">
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">
            Min {{ f['password'].errors['minlength']?.requiredLength }} characters
          </span>
        </div>
      </div>

      <div class="form-actions slide-up-3">
        <div class="form-group checkbox">
          <input id="rememberMe" type="checkbox" formControlName="rememberMe" [disabled]="isLoading"
            class="custom-checkbox" />
          <label for="rememberMe">Remember me</label>
        </div>
        <a href="javascript:void(0)" (click)="forgotPassword()" class="forgot-link text-small">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="login-button btn-primary slide-up-4" [disabled]="isLoading" (click)="sendOtp()">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="sso-divider slide-up-4">
        <span>or continue with</span>
      </div>

      <div class="sso-buttons slide-up-4">
        <button type="button" class="btn-sso btn-google" [disabled]="isLoading" (click)="loginWithProvider('google')">
          <svg viewBox="0 0 24 24" class="sso-icon">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Google
        </button>
        <button type="button" class="btn-sso btn-facebook" [disabled]="isLoading"
          (click)="loginWithProvider('facebook')">
          <svg viewBox="0 0 24 24" class="sso-icon">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
              fill="#1877F2" />
          </svg>
          Facebook
        </button>
      </div>
    </form>

    <div class="login-footer slide-up-5">
      <p class="text-muted">Don't have an account?</p>
      <button (click)="createAccount()" class="signup-link btn-outline">
        Create an account
      </button>
    </div>
  </div>
</div>
