<div class="login-container">
  <!-- Animated Background Elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-card glass-panel">
    <div class="brand-header">
      <div class="brand-icon pulse-custom">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
    </div>

    <div class="auth-headings">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your ProDash account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div *ngIf="errorMessage" class="error-message general-error animate-fade-in">
        <svg viewBox="0 0 24 24" fill="none" class="error-icon" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <div *ngIf="successMessage" class="success-message general-success animate-fade-in">
        <svg viewBox="0 0 24 24" fill="none" class="success-icon" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <div class="form-group slide-up-1">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input id="email" type="email" formControlName="email" class="form-input"
            [ngClass]="{ 'input-error': submitted && f['email'].errors }" placeholder="name@company.com"
            [disabled]="isLoading" />
        </div>
        <div *ngIf="submitted && f['email'].errors" class="error-message animate-fade-in">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Email is invalid</span>
        </div>
      </div>

      <div class="form-group slide-up-2">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input id="password" type="password" formControlName="password" class="form-input"
            [ngClass]="{ 'input-error': submitted && f['password'].errors }" placeholder="••••••••"
            [disabled]="isLoading" />
        </div>
        <div *ngIf="submitted && f['password'].errors" class="error-message animate-fade-in">
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">
            Min {{ f['password'].errors['minlength']?.requiredLength }} characters
          </span>
        </div>
      </div>

      <div class="form-actions slide-up-3">
        <div class="form-group checkbox">
          <input id="rememberMe" type="checkbox" formControlName="rememberMe" [disabled]="isLoading"
            class="custom-checkbox" />
          <label for="rememberMe">Remember me</label>
        </div>
        <a href="javascript:void(0)" (click)="forgotPassword()" class="forgot-link text-small">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="login-button btn-primary slide-up-4" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="login-footer slide-up-5">
      <p class="text-muted">Don't have an account?</p>
      <button (click)="createAccount()" class="signup-link btn-outline">
        Create an account
      </button>
    </div>
  </div>
</div>
