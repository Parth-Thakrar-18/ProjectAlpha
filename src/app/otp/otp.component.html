<div class="otp-container">
    <!-- Animated Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="otp-card glass-panel">

        <!-- Header -->
        <div class="brand-header">
            <div class="brand-icon pulse-custom">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>

        <div class="auth-headings">
            <h1 class="otp-title">Verify Account</h1>
            <p class="otp-subtitle">We sent a 6-digit code to your email</p>
        </div>

        <!-- Alert Messages -->
        <div *ngIf="errorMessage" class="alert general-error animate-fade-in">
            <svg viewBox="0 0 24 24" fill="none" class="alert-icon" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>{{ errorMessage }}</span>
        </div>

        <div *ngIf="successMessage" class="alert general-success animate-fade-in">
            <svg viewBox="0 0 24 24" fill="none" class="alert-icon" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span>{{ successMessage }}</span>
        </div>

        <!-- Form -->
        <form [formGroup]="otpForm" (ngSubmit)="verifyOTP()" class="otp-form slide-up-1">
            <div class="otp-input-group" formArrayName="digits" (paste)="onPaste($event)">
                <ng-container *ngFor="let digitControl of digitsArr.controls; let i = index">
                    <input #otpInput type="text" [formControlName]="i" maxlength="1" class="otp-digit-input"
                        [ngClass]="{ 'input-error': submitted && otpForm.invalid }" (input)="onInputEvent($event, i)"
                        (keydown)="onKeyDownEvent($event, i)" [disabled]="isLoading" />
                </ng-container>
            </div>

            <div *ngIf="submitted && otpForm.invalid" class="error-message message-center">
                <span>Please enter all 6 digits</span>
            </div>

            <button type="submit" class="btn-primary slide-up-2" [disabled]="isLoading">
                <span *ngIf="!isLoading">Verify Code</span>
                <span *ngIf="isLoading" class="loader"></span>
            </button>
        </form>

        <div class="otp-footer slide-up-3">
            <p class="text-muted">Didn't receive the code?</p>
            <button (click)="sendOtp()" class="resend-link btn-outline" [disabled]="isLoading">
                Resend code
            </button>
        </div>
    </div>
</div>
