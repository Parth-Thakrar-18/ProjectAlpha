<div class="login-container">
    <!-- Animated Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-card glass-panel">
        <div class="brand-header">
            <div class="brand-icon pulse-custom">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>

        <div class="auth-headings">
            <h1 class="login-title">Create New Password</h1>
            <p class="login-subtitle">Enter your new password below.</p>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="login-form">
            <div *ngIf="errorMessage" class="error-message general-error animate-fade-in">
                <svg viewBox="0 0 24 24" fill="none" class="error-icon" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span>{{ errorMessage }}</span>
            </div>

            <div *ngIf="successMessage" class="success-message general-success animate-fade-in">
                <svg viewBox="0 0 24 24" fill="none" class="success-icon" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>{{ successMessage }}</span>
            </div>

            <div class="form-group slide-up-1">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input id="password" type="password" formControlName="password" class="form-input"
                        [ngClass]="{ 'input-error': submitted && f['password'].errors }" placeholder="••••••••"
                        [disabled]="isLoading" />
                </div>
                <div *ngIf="submitted && f['password'].errors" class="error-message animate-fade-in">
                    <span *ngIf="f['password'].errors['required']">Password is required</span>
                    <span *ngIf="f['password'].errors['minlength']">
                        Min {{ f['password'].errors['minlength']?.requiredLength }} characters
                    </span>
                </div>
            </div>

            <div class="form-group slide-up-2">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input id="confirmPassword" type="password" formControlName="confirmPassword" class="form-input"
                        [ngClass]="{ 'input-error': submitted && (f['confirmPassword'].errors || resetForm.hasError('mismatch')) }"
                        placeholder="••••••••" [disabled]="isLoading" />
                </div>
                <div *ngIf="submitted" class="error-message animate-fade-in">
                    <span *ngIf="f['confirmPassword'].errors && f['confirmPassword'].errors['required']">Confirm
                        password is required</span>
                    <span *ngIf="resetForm.hasError('mismatch') && !f['confirmPassword'].errors">Passwords do not
                        match</span>
                </div>
            </div>

            <button type="submit" class="login-button btn-primary slide-up-3 mt-2" [disabled]="isLoading">
                <span *ngIf="!isLoading">Update Password</span>
                <span *ngIf="isLoading" class="loader"></span>
            </button>
        </form>
    </div>
</div>
